        .material-symbols-outlined {

<body class="bg-background min-h-screen flex items-center justify-center font-body-md text-text-primary p-4 md:p-8">
<div class="w-full max-w-md bg-surface-card rounded-[1.5rem] shadow-[0_8px_30px_rgb(0,0,0,0.04)] p-8 md:p-10 border border-surface-container-highest">
<div class="flex flex-col items-center mb-8">
<div class="w-12 h-12 bg-primary rounded-xl flex items-center justify-center mb-4 text-on-primary">
<span class="material-symbols-outlined text-2xl" data-icon="inventory_2">inventory_2</span>
</div>
<h1 class="font-headline-lg text-headline-lg-mobile md:text-headline-lg text-text-primary text-center">Lumina IoT</h1>
<p class="font-body-md text-body-md text-text-secondary mt-2 text-center">Sign in to your dashboard</p>
</div>
<form action="#" class="space-y-6" method="POST">
<div>
<label class="block font-label-md text-label-md text-text-primary mb-2" for="email">Email</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-text-secondary">
<span class="material-symbols-outlined text-xl" data-icon="mail">mail</span>
</div>
<input class="block w-full pl-10 pr-3 py-3 bg-surface-bright border border-surface-variant rounded-xl text-text-primary font-body-md text-body-md focus:ring-2 focus:ring-primary focus:border-primary transition-colors" id="email" name="email" placeholder="admin@lumina.io" required="" type="email"/>
</div>
</div>
<div>
<div class="flex items-center justify-between mb-2">
<label class="block font-label-md text-label-md text-text-primary" for="password">Password</label>
<a class="font-label-md text-label-md text-primary hover:text-primary-container transition-colors" href="#">Forgot Password?</a>
</div>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-text-secondary">
<span class="material-symbols-outlined text-xl" data-icon="lock">lock</span>
</div>
<input class="block w-full pl-10 pr-3 py-3 bg-surface-bright border border-surface-variant rounded-xl text-text-primary font-body-md text-body-md focus:ring-2 focus:ring-primary focus:border-primary transition-colors" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<button class="w-full flex justify-center py-3 px-4 border border-transparent rounded-2xl shadow-sm font-label-md text-label-md text-on-surface bg-text-primary hover:bg-on-surface-variant focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-all duration-200" type="submit">
<span class="text-white">Login</span>
</button>
</form>
<div class="mt-8 text-center">
<p class="font-body-md text-body-md text-text-secondary">
                Don't have an account? <a class="text-primary hover:text-primary-container font-label-md text-label-md" href="#">Contact IT Support</a>
</p>
</div>
</div>
</body></html>
